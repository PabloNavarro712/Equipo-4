<div class="container">
    <div class="row">
      <div class="col-md-4">
        <div class="card mb-4">
          <img src="ruta-de-la-imagen" class="card-img-top" alt="Título del servicio">
          <div class="card-body">
            <h5 class="card-title">Título del servicio</h5>
            <p class="card-text">Descripción del servicio</p>
  
            <h6>Incluye:</h6>
            <ul>
              <li>Elemento 1</li>
              <li>Elemento 2</li>
              <li>Elemento 3</li>
            </ul>
  
            <p class="card-text">Precio base: $XXX.XX</p>
            <p class="card-text">Precio total: $XXX.XX</p>
  
            <button class="btn btn-primary">
              <i class="bi bi-list-check"></i> Agregar Opciones
            </button>
  
            <h6>Opciones Adicionales:</h6>
            <ul>
              <li>
                <label>
                  <input type="checkbox">
                  Opción 1 - $XX.XX
                </label>
              </li>
              <li>
                <label>
                  <input type="checkbox">
                  Opción 2 - $XX.XX
                </label>
              </li>
            </ul>
  
            <button class="btn btn-success mt-2">
              <i class="bi bi-calendar-check"></i> Reservar
            </button>
  
            <!-- Botones para la vista de administrador -->
            <div class="admin-buttons mt-3">
              <button class="btn btn-warning me-2">
                <i class="bi bi-pencil-square"></i> Editar
              </button>
              <button class="btn btn-danger">
                <i class="bi bi-trash"></i> Eliminar
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  
    <!-- Botón para agregar nuevo servicio en la vista de administrador -->
    <div class="row">
      <div class="col-12 text-center mt-4">
        <button class="btn btn-primary">
          <i class="bi bi-plus-circle"></i> Agregar Nuevo Servicio
        </button>
      </div>
    </div>
  </div>
